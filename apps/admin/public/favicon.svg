      .favicon-light { display: none; }
      .favicon-dark { display: block; }
    }
  </style>
  <image class="favicon-light" width="48" height="48" href="data:image/png;base64," />
  <image class="favicon-dark" width="48" height="48" href="data:image/png;base64," />
</svg>
