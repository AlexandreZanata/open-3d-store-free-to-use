# HTTP-only domain bootstrap — used before Let's Encrypt certs exist.
# install-nginx-domain.sh enables this when /etc/letsencrypt/live/<domain>/fullchain.pem is missing.
# Then: certbot --nginx -d yourdomain.com -d www.yourdomain.com -d admin.yourdomain.com
# Re-run install-nginx-domain.sh to switch to nginx.conf (HTTPS + redirects).

upstream print3d_api {
    server 127.0.0.1:3101;
    keepalive 32;
}

upstream print3d_web {
    server 127.0.0.1:4173;
    keepalive 32;
}

upstream print3d_admin {
    server 127.0.0.1:4174;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/wasm
        model/gltf-binary
        model/gltf+json;

    client_max_body_size 256m;

    location ^~ /models/ {
        alias /var/www/print3d/models/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ^~ /assets/ {
        alias /var/www/print3d/apps/web/dist/client/assets/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ^~ /brand/ {
        alias /var/www/print3d/apps/web/dist/client/brand/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /api/ {
        proxy_pass http://print3d_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_body_timeout 300s;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/print3d/infra/nginx/acme-webroot;
        allow all;
    }

    location / {
        proxy_pass http://print3d_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.yourdomain.com;

    client_max_body_size 256m;

    location / {
        proxy_pass http://print3d_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
