name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://print3d:print3d@localhost:5432/print3d
  REDIS_URL: redis://localhost:6379
  TEST_DATABASE_URL: postgresql://print3d:print3d@localhost:5432/print3d
  WHATSAPP_PHONE_NUMBER: "5565999999999"
  CORS_ORIGIN: http://localhost:5173
  MODEL_FILES_BASE_PATH: /tmp/print3d-models
  MODEL_FILES_BASE_URL: http://localhost:5173/models

jobs:
  test:
    name: Quality gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: print3d
          POSTGRES_PASSWORD: print3d
          POSTGRES_DB: print3d
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U print3d"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8.8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rewrite git SSH URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @print3d/api exec drizzle-kit migrate

      - run: ./scripts/quality-gate.sh ci

  e2e:
    name: E2E
    needs: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: print3d
          POSTGRES_PASSWORD: print3d
          POSTGRES_DB: print3d
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U print3d"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8.8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rewrite git SSH URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Write apps/api/.env for tsx --env-file
        run: |
          mkdir -p "${MODEL_FILES_BASE_PATH}"
          {
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "TEST_DATABASE_URL=${TEST_DATABASE_URL}"
            echo "REDIS_URL=${REDIS_URL}"
            echo "WHATSAPP_PHONE_NUMBER=${WHATSAPP_PHONE_NUMBER}"
            echo "CORS_ORIGIN=${CORS_ORIGIN}"
            echo "MODEL_FILES_BASE_PATH=${MODEL_FILES_BASE_PATH}"
            echo "MODEL_FILES_BASE_URL=${MODEL_FILES_BASE_URL}"
            echo "ADMIN_ORIGIN=http://localhost:5174"
            echo "ADMIN_BOOTSTRAP_EMAIL=admin@test.local"
            echo "ADMIN_BOOTSTRAP_PASSWORD=test-password-12"
            echo "PORT=3010"
            echo "NODE_ENV=development"
          } > apps/api/.env

      - run: pnpm --filter @print3d/api exec drizzle-kit migrate

      - run: pnpm --filter @print3d/api db:seed
        env:
          ADMIN_BOOTSTRAP_EMAIL: admin@test.local
          ADMIN_BOOTSTRAP_PASSWORD: test-password-12

      - run: pnpm exec playwright install chromium --with-deps

      - run: pnpm e2e
        env:
          CI: true
          VITE_API_BASE_URL: http://localhost:3010/api/v1
          ADMIN_ORIGIN: http://localhost:5174
          ADMIN_BOOTSTRAP_EMAIL: admin@test.local
          ADMIN_BOOTSTRAP_PASSWORD: test-password-12

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  deploy:
    name: Deploy to VPS
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: cd /var/www/print3d && ./infra/scripts/deploy.sh
