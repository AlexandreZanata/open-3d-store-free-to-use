# Local development — Postgres 18.4 + Redis 8.8
# See docs/infrastructure/docker-compose.md

services:
  postgres:
    image: postgres:18.4-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: print3d_dev
      POSTGRES_USER: print3d
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init-test-db.sql:/docker-entrypoint-initdb.d/02-init-test-db.sql:ro

  redis:
    image: redis:8.8-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: localdev123

volumes:
  postgres_data:
