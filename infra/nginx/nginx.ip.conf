# HTTP-only — VPS IP access (no SSL, no certbot).
# Deploy: infra/scripts/install-nginx-ip.sh
# Replace YOUR_VPS_IP before enable (deploy script does this automatically).

upstream print3d_api {
    server 127.0.0.1:PRINT3D_API_PORT;
    keepalive 32;
}

upstream print3d_web {
    server 127.0.0.1:4173;
    keepalive 32;
}

upstream print3d_admin {
    server 127.0.0.1:4174;
    keepalive 16;
}

server {
    listen NGINX_HTTP_PORT;
    listen [::]:NGINX_HTTP_PORT;
    server_name YOUR_VPS_IP;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/wasm
        model/gltf-binary
        model/gltf+json;

    # Contract: docs/api/admin-contract.md — model uploads up to 256 MB
    client_max_body_size 256m;

    location ^~ /models/ {
        alias PRINT3D_APP_DIR/models/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Hashed Vite bundles — filesystem (avoids SSR HTML fallback on stale proxy cache)
    location ^~ /assets/ {
        alias PRINT3D_APP_DIR/apps/web/dist/client/assets/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ^~ /brand/ {
        alias PRINT3D_APP_DIR/apps/web/dist/client/brand/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /api/ {
        proxy_pass http://print3d_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_body_timeout 300s;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://print3d_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://print3d_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
